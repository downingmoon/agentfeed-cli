name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    environment: npm-publish
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js for trusted publishing
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org

      - name: Use pinned npm
        run: npm install -g npm@11.6.0

      - name: Verify trusted publishing toolchain
        run: |
          node --version
          npm --version
          node -e "const [major, minor] = process.versions.node.split('.').map(Number); if (major < 22 || (major === 22 && minor < 14)) throw new Error('npm trusted publishing requires Node.js >=22.14.0');"
          npm --version | node -e "let data=''; process.stdin.on('data', c => data += c); process.stdin.on('end', () => { const [major, minor, patch] = data.trim().split('.').map(Number); if (major < 11 || (major === 11 && (minor < 5 || (minor === 5 && patch < 1)))) throw new Error('npm trusted publishing requires npm >=11.5.1'); });"

      - name: Install dependencies
        run: npm ci

      - name: Release preflight
        run: npm run release:preflight

      - name: Publish to npm
        run: npm publish --access public
